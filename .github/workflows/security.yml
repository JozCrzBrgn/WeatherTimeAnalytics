name: Security Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export .env.example variables
        run: |
            grep -v '^#' .env.example >> $GITHUB_ENV

      # Cache Trivy DB
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db

      # Scan filesystem
      - name: Scan filesystem
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          scanners: vuln,secret,misconfig
          hide-progress: true

      # Scan image Postgres
      - name: Scan Postgres image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: postgres:${{ env.PG_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL
          scanners: vuln
          hide-progress: true