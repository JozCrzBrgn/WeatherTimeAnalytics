name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # -------------------------
  # 1️⃣ LINT 
  # -------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

  # -------------------------
  # 2️⃣ TEST + COVERAGE
  # -------------------------
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ${{ vars.PG_USER }}
          POSTGRES_PASSWORD: ${{ secrets.PG_PASSWORD }}
          POSTGRES_DB: ${{ vars.PG_DBNAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{ vars.PG_USER }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare environment
        run: |
          cp .env.example .env
          grep -v '^#' .env > .env.tmp
          mv .env.tmp .env

      - name: Overwrite postgres credentials for CI
        run: |
          echo "PG_HOST=localhost" >> $GITHUB_ENV
          echo "PG_PORT=5432" >> $GITHUB_ENV
          echo "PG_DBNAME=${{ vars.PG_DBNAME }}" >> $GITHUB_ENV
          echo "PG_USER=${{ vars.PG_USER }}" >> $GITHUB_ENV
          echo "PG_PASSWORD=${{ secrets.PG_PASSWORD }}" >> $GITHUB_ENV

      - name: Validate environment variables
        run: |
            python - <<EOF
            from core.config import get_settings
            get_settings()
            print("Environment variables validated successfully.")
            EOF

      - name: Run tests
        run: |
          coverage run --omit="tests/*,mocks/*" -m pytest
          coverage report --fail-under=90
          coverage xml

      - name: Upload coverage artifact
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # -------------------------
  # 3️⃣ SONAR 
  # -------------------------
  sonar:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Validate Sonar secrets
        run: |
          test -n "${{ secrets.SONAR_TOKEN }}" || (echo "SONAR_TOKEN missing" && exit 1)
          test -n "${{ vars.SONAR_PROJECT_KEY }}" || (echo "SONAR_PROJECT_KEY missing" && exit 1)
          test -n "${{ vars.SONAR_ORGANIZATION }}" || (echo "SONAR_ORGANIZATION missing" && exit 1)

      - name: Sonar Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=tests/**,mocks/**,database/**,security_reports/**,.github/**,**/__pycache__/**,main.py
            -Dsonar.qualitygate.wait=true