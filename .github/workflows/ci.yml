name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # -------------------------
  # 1️⃣ LINT 
  # -------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

  # -------------------------
  # 2️⃣ TEST + COVERAGE
  # -------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare environment
        run: |
          cp .env.example .env
          grep -v '^#' .env > .env.tmp
          mv .env.tmp .env

      - name: Validate environment variables
        run: |
            python - <<EOF
            from core.config import get_settings
            get_settings()
            print("Environment variables validated successfully.")
            EOF

      - name: Run tests
        run: |
          coverage run --omit="tests/*" -m pytest
          coverage report --fail-under=90
          coverage xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml

  # -------------------------
  # 3️⃣ SONAR 
  # -------------------------
  sonar:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Validate Sonar secrets
        run: |
          test -n "${{ secrets.SONAR_TOKEN }}" || (echo "SONAR_TOKEN missing" && exit 1)
          test -n "${{ vars.SONAR_PROJECT_KEY }}" || (echo "SONAR_PROJECT_KEY missing" && exit 1)
          test -n "${{ vars.SONAR_ORGANIZATION }}" || (echo "SONAR_ORGANIZATION missing" && exit 1)

      - name: Sonar Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=tests/**,.github/**,**/__pycache__/**,main.py
            -Dsonar.qualitygate.wait=true